global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'et-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # Redis no expone endpoint Prometheus nativo; requiere redis_exporter sidecar
  # - job_name: 'redis'
